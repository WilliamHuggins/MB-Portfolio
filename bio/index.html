<body>
  <header class="site-header">

          </p>
          <div style="height: 100px; background: var(--border-color); opacity: 0.2; margin-top: var(--space-md); border-radius: var(--radius-sm);"></div>
          <div style="height: 60px; background: var(--border-color); opacity: 0.2; margin-top: var(--space-sm); border-radius: var(--radius-sm);"></div>
