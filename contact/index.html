<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Mariella Brown</title>
  <meta name="description" content="Contact Mariella Brown.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://example.com/contact/">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/assets/css/styles.css">
  
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container nav-inner">
      <a href="/" class="brand">MB.</a>
      <button class="mobile-toggle" aria-label="Toggle menu" aria-expanded="false">☰</button>
      <nav class="nav-links">
        <a href="/" data-i18n="nav.home">Home</a>
        <a href="/bio/" data-i18n="nav.bio">Bio</a>
        <a href="/gallery/" data-i18n="nav.gallery">Gallery</a>
        <a href="/contact/" data-i18n="nav.contact">Contact</a>
        <a href="/styleguide/" style="opacity: 0.5;">Style Guide</a>
      </nav>
      <div class="controls">
        <button id="lang-toggle" class="control-btn" aria-label="Toggle language">ES</button>
        <button id="theme-toggle" class="control-btn" aria-label="Toggle theme">☾</button>
      </div>
    </div>
  </header>

  <main class="container section" style="padding-top: 160px; min-height: 80vh;">
    <div class="fade-in" style="max-width: 600px; margin: 0 auto;">
      <h1 data-i18n="contact.title" style="text-align: center;">Contact</h1>
      <p data-i18n="contact.subtitle" style="text-align: center; color: var(--text-secondary); margin-bottom: var(--space-lg);">Let's create something beautiful together.</p>
      
      <form onsubmit="event.preventDefault();" style="background: var(--card-bg); padding: var(--space-lg); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);">
        <div class="form-group">
          <label class="form-label" data-i18n="contact.form.name">Name</label>
          <input type="text" class="form-input" data-i18n="contact.form.name" placeholder="Name" />
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="contact.form.email">Email</label>
          <input type="email" class="form-input" data-i18n="contact.form.email" placeholder="Email" />
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="contact.form.message">Message</label>
          <textarea class="form-input" data-i18n="contact.form.message" placeholder="Message"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;" data-i18n="contact.form.submit">Send Message</button>
      </form>
      
      <div style="text-align: center; margin-top: var(--space-lg);">
        <a href="mailto:placeholder@example.com" class="btn btn-ghost">mailto:placeholder@example.com</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="copyright" data-i18n="footer.copyright">© 2026 Mariella Brown. All rights reserved.</div>
      <div class="social-links">
        <a href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="#" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="#" target="_blank" rel="noopener noreferrer">YouTube</a>
      </div>
    </div>
  </footer>

  <script src="/assets/js/i18n.js"></script>
  <script src="/assets/js/main.js"></script>
</body>
</html>
